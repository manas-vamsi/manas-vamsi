<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" fill="none" role="img" aria-label="Animated neon Bloch sphere">
  <defs>
    <radialGradient id="core" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#2A0A4A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#050014" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="vec" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#FF2EE6"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="equator" d="M30,120 a90,32 0 1,0 180,0 a90,32 0 1,0 -180,0"/>
  </defs>

  <!-- sphere -->
  <circle cx="120" cy="120" r="90" fill="url(#core)" stroke="#B026FF" stroke-width="1.6" filter="url(#glow)" opacity="0.95"/>
  <!-- equator + meridian (perspective ellipses) -->
  <ellipse cx="120" cy="120" rx="90" ry="32" fill="none" stroke="#00E5FF" stroke-width="1.3" opacity="0.55" filter="url(#glow)"/>
  <ellipse cx="120" cy="120" rx="32" ry="90" fill="none" stroke="#FF2EE6" stroke-width="1.3" opacity="0.5" filter="url(#glow)"/>
  <!-- z axis -->
  <line x1="120" y1="22" x2="120" y2="218" stroke="#7C3AED" stroke-width="1" stroke-dasharray="3 5" opacity="0.7"/>

  <!-- |0> and |1> poles -->
  <text x="120" y="16" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#F5F3FF">|0⟩</text>
  <text x="120" y="234" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#F5F3FF">|1⟩</text>

  <!-- state vector |ψ> pointing up-right, gently precessing -->
  <g filter="url(#glow)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="-12 120 120" to="12 120 120" dur="5s" values="-12 120 120;12 120 120;-12 120 120" repeatCount="indefinite"/>
      <line x1="120" y1="120" x2="178" y2="64" stroke="url(#vec)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="178" cy="64" r="6" fill="#FF2EE6"/>
      <circle cx="178" cy="64" r="2.4" fill="#FFFFFF"/>
    </g>
  </g>

  <!-- electron orbiting the equator -->
  <circle r="4.5" fill="#00E5FF" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" rotate="auto"><mpath href="#equator"/></animateMotion>
  </circle>
  <!-- center dot -->
  <circle cx="120" cy="120" r="3" fill="#F5F3FF"/>
</svg>
